site_name: Kanvas
site_description: API documentation for the Kanvas Kotlin graphics engine
site_url: https://ygdrasil-io.github.io/kanvas/
repo_url: https://github.com/ygdrasil-io/kanvas
repo_name: ygdrasil-io/kanvas

docs_dir: docs
site_dir: _site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  # awesome-pages — laisse le post-processeur générer .pages files dans
  # docs/api/ pour : (1) renommer les sections, (2) regrouper les ~30 classes
  # et ~180 helpers top-level en familles, (3) collapser le doublon math/math/
  # introduit par Dokka.
  - awesome-pages:
      collapse_single_pages: true
