<!doctype html>
<html lang="en">
<body style="margin:0">
<canvas id="fixture" width="24" height="16"></canvas>
<script>
const canvas = document.getElementById("fixture");
const ctx = canvas.getContext("2d");
ctx.fillStyle = "#1267b1";
ctx.fillRect(0, 0, 24, 16);
ctx.fillStyle = "#f4d35e";
ctx.fillRect(0, 0, 12, 8);
ctx.fillStyle = "#ee4266";
ctx.fillRect(12, 0, 12, 8);
ctx.fillStyle = "#2a9d8f";
ctx.fillRect(0, 8, 12, 8);
ctx.fillStyle = "rgba(255,255,255,0.5)";
ctx.fillRect(6, 4, 12, 8);
</script>
</body>
</html>
