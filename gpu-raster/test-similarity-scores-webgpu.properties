# gpu-raster GM cross-test similarity scores (vs original-888 reference PNGs)
#
# Each line records the per-channel similarity (tolerance = 8) of a GM
# rendered through SkWebGpuDevice (gpu-raster) compared to the upstream
# Skia DM reference PNG. The format mirrors :cpu-raster's
# test-similarity-scores.properties so a future SimilarityTracker can
# read both files with the same parser.
#
# **G6.0 colorspace post-process applied (since #486).** WebGpuSink
# applies sRGB-encoded -> linear -> Rec.2020-primaries -> Rec.2020-OETF
# per pixel before comparison. Reference PNGs are encoded in
# `DM unified Rec.2020` (Rec.2020 primaries + Rec.2020 transfer fn ;
# see TestUtils.DM_REFERENCE_COLOR_SPACE), so this aligns the
# comparison space. Scores jumped 7-29 points after G6.0 -- proof
# that colorspace was the dominant drift source for the cross-tests
# (cf. G3.1.1 BigRectGM remaining at 70.7%).
#
# Tolerance 8 still permits sub-pixel edge convention drift (AA stroke
# corners, hairline rounding, etc.). 3/9 GMs hit 100 % similarity now ;
# the 6 below 100 % (BigRectGM, ThinStrokedRectsGM, Skbug12244GM,
# BatchedConvexPathsGM, ConcavePathsGM, FillTypeGM) are blocked by AA
# stroke corner edges, sub-pixel stroke widths, non-AA multi-contour
# fill vs AA reference, AA cubic Bezier edge fractional coverage,
# concave single-contour AA, and stencil-and-cover outside-half AA loss
# respectively.

ThinRectsGM=100.00
ClipStrokeRectGM=100.00
# ScaledRectsGM : drawPaint bg + clipRect axis-aligned + 2 large rects
# under rotated/skewed CTM (G3.3a polygon path) + kPlus blend (G3.3a.1).
# After G6.0 colorspace transform : perfect match (100 %).
ScaledRectsGM=100.00
# BigRectGM : 240+ rects with stroke (sw=0 hairline + sw=1 thin), AA on/off,
# clipRect axis-aligned, extreme coords. After G6.0 : 99.90 % (40 pixels
# off out of 40625 -- AA hairline + AA stroke corner edge cases, will be
# closed by G3.4 SkStroker generic).
BigRectGM=99.90
# ThinStrokedRectsGM : 7 x 8 grid of axis-aligned stroked rects with sub-
# pixel stroke widths (4, 2, 1, 0.5, 0.25, 0.125, 0). After G6.0 : 94.21 %
# (sub-pixel stroke edge conventions vs raster's strokeRectAA still drift
# on the thin widths -- G3.4 territory).
ThinStrokedRectsGM=94.21
# Skbug12244GM : single drawPath, non-AA fill, MULTI-CONTOUR line-only.
# After G3.3b.2b stencil-and-cover : 99.29 % (the hole between the two
# contours is correctly excluded via winding count). Remaining 0.71 % =
# ~160 edge pixels where the reference (rasterized with AA) has
# fractional coverage but our non-AA fill is binary. Closed by G3.3b.3
# (AA stencil-and-cover) or AA polygon work.
Skbug12244GM=99.29
# BatchedConvexPathsGM : 10 single-contour convex cubic-Bezier polygons
# at shrinking scales, translucent SrcOver stacking on black. Pure
# feature stack exercised : G3.3b.1 cubic flattening + G3.3b.2a AA
# polygon coverage + G2.1 translucent SrcOver + G6.0/G6.1 colorspace.
# Score : 99.94 % (~160 pixels drift on AA edges, sub-channel).
BatchedConvexPathsGM=99.94
# FiddleGM : empty onDraw, renders only the default white background.
# Exercises the no-draws-only-background-clear path through the
# G6.0/G6.1 sRGB -> Rec.2020 present-pass transform. Round-trip exact.
FiddleGM=100.00
# ClipDrawDrawGM : crbug.com/423834 repro -- clipRect + drawRect + drawRect
# sequences testing integer-edge rounding consistency between clipRect
# and drawRect. Pure axis-aligned non-AA fill rects on the rect
# fast-path (G1.2 scissor + G2.3a non-AA fill). Perfect match.
ClipDrawDrawGM=100.00
# Bug7792GM : 16 line-only paths exercising moveTo/close edge cases for
# the non-AA fill rasterizer (skbug.com/40039046). Multi-contour kWinding
# fill via stencil-and-cover (G3.3b.2b). 99.99 % -- ~70 edge pixels
# differ sub-channel because the reference is AA-rasterised while our
# fill is binary coverage. Closed by G3.3b.3 (AA stencil-and-cover).
Bug7792GM=99.99
# ConcavePathsGM : 29 concave / self-intersecting / coincident-edge cells,
# all painted with isAntiAlias = true. After the G3.3b.3a follow-up,
# single-contour concave paths are detected via cross-product convexity
# and routed through the same AA stencil-and-cover path as multi-contour
# (the fan-tessellation winding count naturally cancels in the concave
# pockets). Score : 98.90 % -- residual drift is the half-pixel outside
# AA loss inherent to stencil-gated cover and a few cells with extreme
# self-intersection where fan-tess winding cancellation isn't enough.
ConcavePathsGM=98.90
# FillTypeGM : 4x4 grid -- two overlapping circles (multi-contour) drawn
# under each of the 4 fill types (kWinding, kEvenOdd, kInverseWinding,
# kInverseEvenOdd) at 2 scales, each in non-AA AND AA passes. Exercises
# the complete G3.3b.3b fill-rule matrix. Score : 99.55 %.
FillTypeGM=99.55
# AnalyticAntialiasInverseGM : single drawPath of a 30-radius circle at
# (100,100) with kInverseWinding fill, AA on, red. Visible field is the
# complement of the disc. Exercises single-contour convex inverse fill
# (G3.3b.3b -- stencil Equal 0 + full-viewport cover). Score : 99.98 %.
AnalyticAntialiasInverseGM=99.98
# PathInvFillGM : 450 x 220, 4 cells = 2 (doclip) x 2 (AA) of a circle
# at (50,50) r=40 with kInverseWinding fill, drawn twice under nested
# axis-aligned clipRects. Exercises convex inverse fill (G3.3b.3b) under
# nested clipRects, non-AA AND AA. Score : 99.50 %.
PathInvFillGM=99.50
# Crbug1472747GM : 400 x 400 single drawPath -- inner + outer ovals at
# r=31000 / r=31005 with kEvenOdd fill producing a thin ring. Each oval
# built from two 180-degree arcTo half-arcs. Tests kEvenOdd on multi-
# contour input with conic-flattened arcs at extreme radius (G3.3b.3b
# on top of G3.3b.1 conic flattening). Score : 98.16 %.
Crbug1472747GM=98.16
# ConvexLineOnlyPathsFillGM : 512 x 512 -- 20 convex line-only polygons
# (narrow rects, trapezoids, teardrops, n-gons up to 100 sides) each
# drawn 7 times at scales {1, .75, .5, .25, .1, .01, .001} alternating
# CW/CCW, AA on, alternating black/white fill. Plus three crbug repros.
# Pure AA polygon shader workout (single-contour convex line-only fill).
# Score : 98.75 %.
ConvexLineOnlyPathsFillGM=98.75
