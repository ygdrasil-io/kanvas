# gpu-raster GM cross-test similarity scores (vs original-888 reference PNGs)
#
# Each line records the per-channel similarity (tolerance = 8) of a GM
# rendered through SkWebGpuDevice (gpu-raster) compared to the upstream
# Skia DM reference PNG. The format mirrors :cpu-raster's
# test-similarity-scores.properties so a future SimilarityTracker can
# read both files with the same parser.
#
# **G6.0 colorspace post-process applied (since #486).** WebGpuSink
# applies sRGB-encoded -> linear -> Rec.2020-primaries -> Rec.2020-OETF
# per pixel before comparison. Reference PNGs are encoded in
# `DM unified Rec.2020` (Rec.2020 primaries + Rec.2020 transfer fn ;
# see TestUtils.DM_REFERENCE_COLOR_SPACE), so this aligns the
# comparison space. Scores jumped 7-29 points after G6.0 -- proof
# that colorspace was the dominant drift source for the cross-tests
# (cf. G3.1.1 BigRectGM remaining at 70.7%).
#
# Tolerance 8 still permits sub-pixel edge convention drift (AA stroke
# corners, hairline rounding, etc.). 6/24 GMs hit 100 % similarity now ;
# the 18 below 100 % are blocked by a mix of AA stroke corner edges,
# sub-pixel stroke widths, non-AA-vs-AA-reference drift, AA cubic
# Bezier edge fractional coverage, extreme self-intersecting concave
# cells, etc. G3.3b.3d (two-pass AA cover) closed the stencil-and-cover
# outside-half AA loss. G3.4.1 unlocked drawPath stroke style via
# SkStroker. G4.1 unlocked the first SkLinearGradient pipeline.

ThinRectsGM=100.00
ClipStrokeRectGM=100.00
# ScaledRectsGM : drawPaint bg + clipRect axis-aligned + 2 large rects
# under rotated/skewed CTM (G3.3a polygon path) + kPlus blend (G3.3a.1).
# After G6.0 colorspace transform : perfect match (100 %).
ScaledRectsGM=100.00
