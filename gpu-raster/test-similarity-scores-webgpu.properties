# gpu-raster GM cross-test similarity scores (vs original-888 reference PNGs)
#
# Each line records the per-channel similarity (tolerance = 8) of a GM
# rendered through SkWebGpuDevice (gpu-raster) compared to the upstream
# Skia DM reference PNG. The format mirrors :cpu-raster's
# test-similarity-scores.properties so a future SimilarityTracker can
# read both files with the same parser.
#
# Notes :
#  - Tolerance 8 absorbs the colorspace drift between the reference's
#    DM unified Rec.2020 encoding and the GPU's current sRGB-direct
#    RGBA8Unorm output. A linear-Rec.2020 render target + present pass
#    convergence is scheduled for G6 (cf. D3 in MIGRATION_PLAN_GPU_WEBGPU.md).
#  - Scores < 90% would fall below the plan's G2 verification floor.
#    Investigate channel drift (typically R or B on saturated colors)
#    before bumping the floor down.

ThinRectsGM=90.890625
# BigRectGM : 240+ rects with stroke (sw=0 hairline + sw=1 thin), AA on/off,
# clipRect axis-aligned, extreme coords (5e10, 1e6). Three sources of drift
# pull the score below the plan's 90% G2 target :
#   1. Hairline (sw=0) painted as non-AA -- Skia distributes coverage between
#      adjacent rows/cols for AA hairlines. Fix needs sub-pixel hairline math.
#   2. Stroke-AA corner pixels : 4-edge decomposition gets corners through
#      top/bottom edge only ; raster's strokeRectAA uses (1 - cov_inside)
#      which gives slightly different fractional values.
#   3. sRGB vs Rec.2020 colorspace drift -- resolved in G6.
# Expect this score to climb in G3.2+ (better hairline AA) and G6 (colorspace).
BigRectGM=70.7
# ClipStrokeRectGM : 2 AA-stroked red rects (sw=22) clipped to horizontal
# bands + 2 non-AA blue clip-frame rects (sw=2). No hairlines, no extreme
# coords, only 4 rect draws total -> aggregate drift much smaller than
# BigRectGM. clipRect(doAntiAlias=true) on integer-aligned rects does NOT
# materialise an SkAAClip in SkCanvas, so bindClip's soft-skip never trips.
# Score above the plan's G2 90% target.
ClipStrokeRectGM=96.605
# ScaledRectsGM : drawPaint bg + clipRect axis-aligned + 2 large rects
# under rotated/skewed CTM (G3.3a polygon path) + kPlus blend (G3.3a.1).
# Same drift band as BigRectGM (sRGB vs Rec.2020 + edge convention on
# rotated parallelograms + no AA polygon coverage yet). Below the plan's
# G2 90% target ; expected to climb with G3.3b (AA polygon) + G6
# (colorspace).
ScaledRectsGM=87.79
# ThinStrokedRectsGM : 7 columns x 8 rows of axis-aligned stroked rects
# with sub-pixel stroke widths (4, 2, 1, 0.5, 0.25, 0.125, 0). All AA.
# The G3.1 4-edge stroke decomposition routes each edge through
# drawFillRect honouring AA via G2.3a coverage. Sub-pixel widths heavily
# exercise the fractional-bounds coverage path. Below G2 90% target ;
# drift = colorspace + sub-pixel edge conventions.
ThinStrokedRectsGM=87.19
# Skbug12244GM : single drawPath, non-AA fill, MULTI-CONTOUR line-only
# (two closed contours, the inner one is meant to be a hole). Pre-G3.3b.2,
# the fan tessellator flattens both contours into a single fan, filling
# the hole. Score reflects that baseline ; expected to climb when proper
# multi-contour tessellation lands.
Skbug12244GM=70.87
