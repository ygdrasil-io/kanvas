name: Deploy docs (Dokka GFM → MkDocs Material → Pages)

on:
  push:
    branches: [master]
    paths:
      - 'math/**'
      - 'kanvas/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Generate per-module API docs (Dokka GFM)
        # Per-module Dokka GFM output.
        # Each module's :dokkaGfm task writes into <module>/build/dokka/gfm/.
        run: |
          ./gradlew --no-daemon \
            :math:dokkaGfm

      - name: Copy GFM output into docs tree
        run: |
          for m in math; do
            mkdir -p docs/api/$m
            cp -r $m/build/dokka/gfm/. docs/api/$m/
          done

      - name: Post-process Dokka GFM (clean MkDocs-incompatible artifacts)
        run: |
          python docs/scripts/postprocess_dokka_gfm.py docs/api/math

      - name: Build site (MkDocs)
        run: mkdocs build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
