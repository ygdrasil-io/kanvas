name: Deploy math docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'math/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate HTML doc (Dokka)
        run: ./gradlew :math:dokkaHtml --no-daemon

      - name: Generate GFM doc (Dokka)
        run: ./gradlew :math:dokkaGfm --no-daemon

      - name: Bundle site
        run: |
          mkdir -p _site
          cp -r math/build/dokka/html/. _site/
          # Sous-arbre markdown sous /markdown — accessible depuis le site HTML.
          mkdir -p _site/markdown
          cp -r math/build/dokka/gfm/. _site/markdown/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
