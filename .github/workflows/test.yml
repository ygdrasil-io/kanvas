name: Test matrix (raster + GPU)

# G7/M31 cross-validation matrix. Three jobs:
#  - `raster`        : :cpu-raster + :skia-integration-tests on ubuntu-latest.
#                      No native GPU driver dependency, fast runner.
#  - `gpu_smoke`     : required macOS smoke gate using `:gpu-raster:gpuSmokeTest`.
#                      This lane must prove adapter-backed fixtures with zero
#                      adapter skips.
#                      Promotion policy for what is allowed in this required
#                      smoke lane: reports/wgsl-pipeline/2026-05-27-m31-gpu-smoke-promotion-policy.md
#  - `gpu_inventory` : non-blocking full `:gpu-raster:test` inventory lane that
#                      stays runnable and uploads triage artifacts.
#
# All jobs trigger on PRs that touch the test surface or any of the
# modules that feed it. The matrix is intentionally split into separate
# jobs (rather than `strategy.matrix`) so a missing WebGPU adapter on the
# raster runner doesn't poison the raster job, and so the macOS runner
# only runs the GPU-relevant test path (it costs ~10x more than ubuntu).

on:
  pull_request:
    branches: [master]
    paths:
      - 'math/**'
      - 'codec-*/**'
      - 'kanvas-skia/**'
      - 'font/**'
      - 'cpu-raster/**'
      - 'gpu-raster/**'
      - 'render-pipeline/**'
      - 'skia-integration-tests/**'
      - 'integration-tests/**'
      - 'kanvas-legacy/src/test/resources/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/test.yml'
      - '.upstream/source/map/**'
      - '.upstream/specs/front/**'
      - '.upstream/specs/font/**'
      - '.upstream/specs/pure-kotlin-text/**'
      - '.upstream/target/rendering-conformance-performance-target.md'
      - '.upstream/target/post-mvp-conformance-backlog.md'
      - 'reports/pure-kotlin-text/**'
      - 'reports/wgsl-pipeline/**'
      - 'scripts/validate_pure_kotlin_text_ci.py'
      - 'scripts/test_validate_pure_kotlin_text_ci.py'
      - 'scripts/validate_pure_kotlin_text_boundary_contracts.py'
      - 'scripts/test_validate_pure_kotlin_text_boundary_contracts.py'
  push:
    branches: [master]
    paths:
      - 'math/**'
      - 'codec-*/**'
      - 'kanvas-skia/**'
      - 'font/**'
      - 'cpu-raster/**'
      - 'gpu-raster/**'
      - 'render-pipeline/**'
      - 'skia-integration-tests/**'
      - 'integration-tests/**'
      - 'kanvas-legacy/src/test/resources/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/test.yml'
      - '.upstream/source/map/**'
      - '.upstream/specs/front/**'
      - '.upstream/specs/font/**'
      - '.upstream/specs/pure-kotlin-text/**'
      - '.upstream/target/rendering-conformance-performance-target.md'
      - '.upstream/target/post-mvp-conformance-backlog.md'
      - 'reports/pure-kotlin-text/**'
      - 'reports/wgsl-pipeline/**'
      - 'scripts/validate_pure_kotlin_text_ci.py'
      - 'scripts/test_validate_pure_kotlin_text_ci.py'
      - 'scripts/validate_pure_kotlin_text_boundary_contracts.py'
      - 'scripts/test_validate_pure_kotlin_text_boundary_contracts.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pure_kotlin_font_foundation:
    name: Pure Kotlin font foundation (ubuntu)
    runs-on: ubuntu-latest
    env:
      FONT_CI_LANE_NAME: pure-kotlin-font-foundation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pure Kotlin text diff hygiene
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before || '' }}"
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA^{commit}"; then
            git fetch --no-tags --prune origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
            BASE_SHA="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD)"
          fi
          if [ -z "$BASE_SHA" ]; then
            echo "Unable to resolve a base commit for pure Kotlin text diff hygiene." >&2
            exit 1
          fi
          git diff --check "$BASE_SHA...HEAD" -- \
            .upstream/specs/pure-kotlin-text \
            reports/pure-kotlin-text

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate pure Kotlin font CI lane
        run: python3 scripts/validate_pure_kotlin_text_ci.py

      - name: Validate pure Kotlin text boundaries
        run: python3 scripts/validate_pure_kotlin_text_boundary_contracts.py

      - name: Run pure Kotlin font foundation Gradle tests
        run: |
          ./gradlew --no-daemon \
            :font:core:test \
            :font:sfnt:test \
            :font:scaler:test \
            :font:text:test \
            :font:glyph:test \
            :font:gpu-api:test

  raster:
    name: Raster tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Audit :math map (zero MISSING, zero STALE)
        # Enforces Kotlin ↔ Skia traceability for `:math` : every public
        # Kotlin symbol must be either mapped in `.upstream/source/map/math/*.tsv`
        # or whitelisted in `.upstream/source/map/math/_ignore.txt` as
        # Kotlin-original (override Any methods are auto-excluded). The
        # script exits non-zero if MISSING > 0 OR STALE > 0. Since M6 the
        # heuristic handles single-line data-class ctors + enum entries, so
        # both invariants are lint-enforcing.
        run: python3 .upstream/source/map/audit.sh math

      - name: Run render pipeline + raster integration tests
        # GPU module deliberately skipped on the raster job — no driver,
        # the WebGPU tests would all skip via Assumptions.assumeTrue and
        # the matrix would mask a real GPU regression. The macos job
        # below owns the GPU coverage.
        run: |
          ./gradlew --no-daemon \
            checkCodecImageComplete \
            :render-pipeline:test \
            :cpu-raster:test \
            :skia-integration-tests:test \
            :math:jvmTest \
            :kanvas-skia:test

      - name: Upload raster debug images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: raster-debug-images
          path: |
            cpu-raster/build/debug-images/
            skia-integration-tests/build/debug-images/
          if-no-files-found: ignore

      - name: Upload raster test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raster-test-reports
          path: |
            cpu-raster/build/reports/tests/
            skia-integration-tests/build/reports/tests/
            cpu-raster/test-similarity-report.md
            skia-integration-tests/test-similarity-report.md
          if-no-files-found: ignore

  gpu_smoke:
    name: GPU tests (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run required GPU smoke gate
        # `:gpu-raster:gpuSmokeTest` injects `-XstartOnFirstThread` on
        # macOS, plus `--add-opens=java.base/java.lang=ALL-UNNAMED` and
        # `--enable-native-access=ALL-UNNAMED` (see build.gradle.kts).
        # Smoke fixture scope is governed by the M31 promotion policy:
        # `reports/wgsl-pipeline/2026-05-27-m31-gpu-smoke-promotion-policy.md`.
        # Expected unsupported diagnostics and adapter skips stay out of
        # required smoke and remain in non-blocking inventory.
        # macOS runners ship a Metal adapter that wgpu4k-toolkit can
        # bind via `WebGpuContext.createOrNull()`. The smoke task fails
        # closed when adapter-dependent tests are skipped.
        run: ./gradlew --no-daemon :gpu-raster:gpuSmokeTest

      - name: Upload GPU smoke debug images
        # Cross-backend tests dump raster.png / gpu.png / diff.png /
        # triptych.png under `gpu-raster/build/debug-images/` whenever
        # either backend lands inside its `floor + 2 %` warning band.
        # The triptych is the single file to open first when triaging.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-debug-images
          path: gpu-raster/build/debug-images/
          if-no-files-found: ignore

      - name: Upload GPU smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-test-reports
          path: |
            gpu-raster/build/reports/tests/gpuSmokeTest/
            gpu-raster/build/test-results/gpuSmokeTest/
            gpu-raster/test-similarity-scores-webgpu.properties
          if-no-files-found: ignore

  gpu_inventory:
    name: GPU inventory (macos, non-blocking)
    runs-on: macos-latest
    needs: [gpu_smoke]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run full GPU inventory (non-blocking)
        # Keep the full adapter-backed inventory runnable for failure
        # classification and PM triage while smoke remains the required
        # merge gate. Step-level continue-on-error keeps the PR check green
        # while preserving JUnit XML and classification artifacts.
        continue-on-error: true
        run: ./gradlew --no-daemon :gpu-raster:gpuInventoryTest

      - name: Upload GPU inventory debug images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-inventory-debug-images
          path: gpu-raster/build/debug-images/
          if-no-files-found: ignore

      - name: Upload GPU inventory test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-inventory-test-reports
          path: |
            gpu-raster/build/reports/tests/test/
            gpu-raster/build/reports/gpu-inventory/
            gpu-raster/build/test-results/test/
            gpu-raster/test-similarity-scores-webgpu.properties
          if-no-files-found: ignore

  wgsl_scene_dashboard_release_gate:
    name: WGSL scene dashboard release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run dashboard release gate and PM bundle
        run: ./gradlew --no-daemon pipelineSceneDashboardGate pipelinePerformanceTrendWarnings pipelinePmBundle

      - name: Upload WGSL dashboard release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wgsl-scene-dashboard-release-gate
          path: |
            build/reports/wgsl-pipeline-scenes/
            build/reports/wgsl-pipeline-scene-gate/
            build/reports/wgsl-pipeline-front-qa/
            build/reports/wgsl-pipeline-performance-warnings/
            build/reports/wgsl-pipeline-pm-bundle/
          if-no-files-found: error
